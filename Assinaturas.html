            <label for="oab">OAB:</label><br>
            <input type="text" id="oab" name="oab" disabled><br><br>

            <label for="color">Cor do Cartão:</label><br>
            <select id="color" name="color">
                <option value="white">Branco</option>
                <option value="blue">Azul</option>
                <option value="black">Preto</option>

            <button type="button" onclick="generateCard()">Gerar Cartão</button>

                oabField.disabled = false; // Habilitar o campo de OAB
