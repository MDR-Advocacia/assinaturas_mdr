<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinaturas MDR</title>
    <link rel="stylesheet" href="EstiloAssinaturas.css">
</head>
<body>

    <div class="logo-container">
        <img src="Logo MDR Advocacia branca.png" alt="Logo MDR Advocacia">
    </div>
    
    <div class="form-container">
        <h1>Gerador de Assinatura</h1>
        <form id="contactForm">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>

            <label for="role">Cargo:</label>
            <select id="role" name="role" onchange="toggleOAB()">
                <option value="Assistente Jurídico">Assistente Jurídico</option>
                <option value="Advogado">Advogado</option>
                <option value="Estagiário">Estagiário</option>
                <option value="Recursos Humanos">RH</option>
                <option value="TI">TI</option>
            </select>
            
            <label for="phone">Telefone:</label>
            <input type="text" id="phone" name="phone" placeholder="(XX) XXXXX-XXXX" required>
            
            <div id="oab-container" style="display: none;">
                <label for="oab">OAB:</label>
                <input type="text" id="oab" name="oab">
            </div>

            <label for="color">Cor da Assinatura:</label>
            <select id="color" name="color">
                <option value="blue">Azul (Padrão)</option>
                <option value="white">Branco</option>
                <option value="black">Preto</option>
            </select>
            
            <button type="button" onclick="generateCard()">Gerar Assinatura</button>
        </form>
    </div>

    <footer>
        <p>Desenvolvido por MDR Advocacia</p>
    </footer>

    <script>
        // Função para mostrar/esconder o campo OAB
        function toggleOAB() {
            const role = document.getElementById("role").value;
            const oabContainer = document.getElementById("oab-container");
            const oabField = document.getElementById("oab");

            if (role === "Advogado") {
                oabContainer.style.display = 'block'; // Mostra o campo
            } else {
                oabContainer.style.display = 'none'; // Esconde o campo
                oabField.value = ""; // Limpa o valor se não for advogado
            }
        }

        // Função que cria o HTML da assinatura
        function getSignatureTemplate(data) {
            
            // Define as cores com base na seleção
            let config = {
                bgColor: '#2b344a', // Azul
                textColor: '#ffffff',
                logoUrl: 'https://drive.google.com/uc?id=1nwRhYl1Jo3c55twJ_Zs29syqSIu3vpV0', // Logo Branca
                iconPhone: 'https://drive.google.com/uc?id=1GqmGSnFlGBgkQLDpUxfaK8-LHs5r2sev',
                iconSite: 'https://drive.google.com/uc?id=1ws9y6duhKAPI8GZeelGlHJd9J2uDboRJ',
                iconAddress: 'https://drive.google.com/uc?id=1ctuGgBAIezALXqymOjVs4xn9nQSinmTP'
            };

            if (data.color === 'white') {
                config = {
                    bgColor: '#ffffff',
                    textColor: '#333333',
                    logoUrl: 'https://drive.google.com/uc?id=1ZhgK53kfd9kFy0SUJCCHn864MpcRlPiY', // Logo Azul
                    iconPhone: 'https://drive.google.com/uc?id=1gBdq236eJvx30PUNzg2FPYr7G3wGkOMM',
                    iconSite: 'https://drive.google.com/uc?id=1L3FN8Fo52S9-y7oJTmHLf1EQUpq6QavE',
                    iconAddress: 'https://drive.google.com/uc?id=1TkNVMf7S-nuv0Ps5Z2Kagfm4Wg1EX1Uf'
                };
            } else if (data.color === 'black') {
                config.bgColor = '#000000';
            }

            // Gera a linha da OAB somente se o campo tiver valor
            const oabLine = data.oab 
                ? `<p style="margin: 0; font-size: 10px; margin-bottom: 15px; color: ${config.textColor};">${data.oab}</p>`
                : '';

            // Retorna o HTML final usando os dados e as cores definidas
            return `
                <table style="width: 100%; max-width: 800px; background-color: ${config.bgColor}; padding: 0; margin: 0; font-family: 'Arial', sans-serif; color: ${config.textColor};">
                    <tr>
                        <td style="padding: 20px 0 10px 30px; vertical-align: top;">
                            <table style="width: 100%;">
                                <tr>
                                    <td style="width: 25%; vertical-align: middle;">
                                        <img src="${config.logoUrl}" alt="Logo MDR" style="width: 100%; max-width: 200px;">
                                    </td>
                                    <td style="vertical-align: middle; padding-left: 30px;">
                                        <h2 style="margin: 0; font-size: 20px; font-weight: 600; color: ${config.textColor};">${data.name}</h2>
                                        <h5 style="margin: 0; font-size: 16px; font-weight: 400; margin-bottom: 5px; color: ${config.textColor};">${data.role}</h5>
                                        ${oabLine}
                                        <table style="font-size: 9px;">
                                            <tr>
                                                <td style="vertical-align: middle; padding-right: 5px;"><img src="${config.iconPhone}" style="width: 15px; height: 15px;"></td>
                                                <td><span style="color: ${config.textColor};">${data.phone}</span></td>
                                            </tr>
                                            <tr>
                                                <td style="vertical-align: middle; padding-right: 5px;"><img src="${config.iconSite}" style="width: 15px; height: 15px;"></td>
                                                <td><a href="https://mdradvocacia.com/" target="_blank" style="color: ${config.textColor}; text-decoration: none;">MDRADVOCACIA.COM</a></td>
                                            </tr>
                                            <tr>
                                                <td style="vertical-align: middle; padding-right: 5px;"><img src="${config.iconAddress}" style="width: 15px; height: 15px;"></td>
                                                <td><span style="color: ${config.textColor};">R. Desembargador José Gomes da Costa, 1975. Capim Macio. Natal/RN</span></td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 0 20px 30px;">
                            <img src="https://drive.google.com/file/d/15UOqmG-rcPEuGZyIKVWzHEvzNtW6MNUw/view?usp=drive_link" alt="Selos e Certificados" style="max-width: 100%; height: auto;">
                        </td>
                    </tr>
                </table>
            `;
        }

        // Função principal que gera o cartão
        function generateCard() {
            // Coleta os dados do formulário
            const cardData = {
                name: document.getElementById("name").value,
                role: document.getElementById("role").value,
                phone: document.getElementById("phone").value,
                oab: document.getElementById("oab").value,
                color: document.getElementById("color").value
            };
            
            // Validação simples
            if (!cardData.name || !cardData.phone) {
                alert("Por favor, preencha os campos de Nome e Telefone.");
                return;
            }

            // Gera o HTML da assinatura
            const cardHTML = getSignatureTemplate(cardData);

            // Abre uma nova aba e insere o HTML gerado
            const newWindow = window.open();
            newWindow.document.write(cardHTML);
            newWindow.document.close();
        }
        
        // Inicia a página com o campo OAB no estado correto
        toggleOAB();
    </script>
</body>
</html>
